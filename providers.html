<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Providers – Vivesta</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bg: #f5f5f7;
      --text: #111827;
      --muted: #4b5563;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --card: #ffffff;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: #111827;
      color: white;
      padding: 16px 16px 18px;
    }

    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .header-title {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .header-title h1 {
      margin: 0;
      font-size: 20px;
    }

    .header-title span {
      font-size: 13px;
      color: #d1d5db;
    }

    .header-nav a {
      color: #e5e7eb;
      text-decoration: none;
      font-size: 13px;
    }

    .header-nav a:hover {
      text-decoration: underline;
    }

    main {
      max-width: 960px;
      margin: 20px auto 32px;
      padding: 0 16px;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
      align-items: center;
    }

    .filters-label {
      font-size: 13px;
      color: var(--muted);
      margin-right: 4px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      border: 1px solid #d1d5db;
      background: #ffffff;
      color: #374151;
      cursor: pointer;
    }

    .pill.active {
      background: #eff6ff;
      border-color: #1d4ed8;
      color: #1d4ed8;
      font-weight: 500;
    }

    #providers-list h2 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .providers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      margin-top: 12px;
    }

    .provider-card {
      background: var(--card);
      border-radius: 10px;
      padding: 14px 16px 16px;
      box-shadow: 0 6px 14px rgba(15, 23, 42, 0.08);
      border: 1px solid var(--border);
    }
