<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Vivesta</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bg: #f5f5f7;
      --text: #111827;
      --muted: #4b5563;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --card: #ffffff;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: #111827;
      color: white;
      padding: 16px 16px 18px;
    }

    .header-inner {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
    }

    .header-inner a {
      color: #e5e7eb;
      font-size: 13px;
      text-decoration: none;
    }

    .header-inner a:hover {
      text-decoration: underline;
    }

    main {
      max-width: 720px;
      margin: 20px auto 32px;
      padding: 0 16px;
    }

    .card {
      background: var(--card);
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.06);
      padding: 18px 18px 20px;
    }

    p {
      margin: 6px 0;
      font-size: 14px;
      color: var(--muted);
    }

    form {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }

    label {
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 14px;
      font-family: inherit;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    button[type="submit"] {
      margin-top: 4px;
      padding: 9px 14px;
      border-radius: 999px;
      border: none;
      background: var(--accent);
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    button[type="submit"]:hover {
      background: var(--accent-dark);
    }

    small {
      font-size: 12px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>Join as a provider</h1>
      <a href="index.html">← Back to home</a>
    </div>
  </header>

  <main>
    <section class="card">
      <p>
        If you offer house cleaning, groceries, or meal prep services in Gatineau and would like
        to be listed on Vivesta, share a few details below.
      </p>
      <p>We’ll review your information and follow up by email.</p>

      <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
        <label>
          Your name
          <input type="text" name="name" required>
        </label>

        <label>
          Email
          <input type="email" name="email" required>
        </label>

        <label>
          Services you offer
          <input type="text" name="services" placeholder="House cleaning, groceries, meal prep…" required>
        </label>

        <label>
          Tell us more
          <textarea name="message" placeholder="Areas you serve, languages, typical rates, availability…"></textarea>
        </label>

        <button type="submit">Send</button>
        <small>You can also email us directly at: hello@vivesta.ca</small>
      </form>
    </section>
  </main>
</body>
</html>
