<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Vivesta</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bg: #f5f5f7;
      --text: #111827;
      --muted: #4b5563;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --card: #ffffff;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: #111827;
      color: white;
      padding: 16px 16px 18px;
    }

    .header-inner {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
    }

    .header-inner a {
      color: #e5e7eb;
      font-size: 13px;
      text-decoration: none;
    }

    .header-inner a:hover {
      text-decoration: underline;
    }

    main {
      max-width: 720px;
      margin: 20px auto 32px;
      padding: 0 16px;
    }

    .card {
      background: var(--card);
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.06);
      padding: 18px 18px 20px;
    }

    p {
      margin: 6px 0;
      font-size: 14px;
      color: var(--muted);
    }

    form {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }

    label {
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 14px;
      font-family: inherit;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }
